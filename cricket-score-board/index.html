<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Score Board</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    text-align:center;
    background:#f4f4f4;
}

.container{
    width:100%;
    max-width:900px;
    margin:10px auto;
}

.scoreboard{
    background:#000;
    color:#fff;
    padding:50px 20px;
}

.scoreboard h1{
    font-size:50px;
    margin-bottom:30px;
}

.scoreboard h2{
    margin:20px 0;
    font-size:35px;
}

.info{
    margin:30px 0 20px;
    font-size:28px;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
    margin:5px;
}
</style>

</head>
<body>

<div class="container">

    <div class="scoreboard">
        <h1>Cricket Score Board</h1>

        <h2>Balls : <span id="balls">0</span></h2>

        <h2>Runs : <span id="runs">0</span></h2>
    </div>

    <p class="info">
        You get total of 6 balls (1 over). The button gets disabled after that
    </p>

    <button id="hitBtn" onclick="hitBall()">Click to hit the ball</button>

    <button onclick="resetGame()">Reset Game</button>

</div>

<script>

let balls = 0;
let runs = 0;

function hitBall(){

    if(balls >= 6){
        return;
    }

    let score = Math.floor(Math.random() * 7); // 0 to 6

    runs += score;
    balls++;

    document.getElementById("balls").innerHTML = balls;
    document.getElementById("runs").innerHTML = runs;

    if(balls === 6){
        document.getElementById("hitBtn").disabled = true;
        alert("Game Over!\nTotal Runs: " + runs);
    }

}

function resetGame(){

    balls = 0;
    runs = 0;

    document.getElementById("balls").innerHTML = balls;
    document.getElementById("runs").innerHTML = runs;

    document.getElementById("hitBtn").disabled = false;

}

</script>

</body>
</html>
